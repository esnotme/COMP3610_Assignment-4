version: "3.9"

services:
  api:
    build: .
    container_name: taxi-tip-api
    ports:
      - "8000:8000"
    environment:
      MODEL_NAME: taxi-tip-regressor
      MODEL_VERSION: 2
      MODEL_PATH: models:/taxi-tip-regressor/2
    depends_on:
      - mlflow
    networks:
      - taxi-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns
    volumes:
      - ./mlruns:/mlruns
    networks:
      - taxi-net

networks:
  taxi-net:
    driver: bridge
